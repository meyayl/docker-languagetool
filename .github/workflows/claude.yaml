name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize]
    paths:
      - "Dockerfile"
      - "Dockerfile.fasttext"
      - "entrypoint/**"

permissions: {}

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@86eb26bf0139bdd75acd15ea5f00f45ee0a284c2 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }} # zizmor: ignore[secrets-outside-env]


          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # Optional: Trigger when specific user is assigned to an issue
          # assignee_trigger: "claude-bot"

          # Optional: Configure Claude's behavior with CLI arguments
          # claude_args: |
          #   --model claude-opus-4-1-20250805
          #   --max-turns 10
          #   --allowedTools "Bash(npm install),Bash(npm run build),Bash(npm run test:*),Bash(npm run lint:*)"
          #   --system-prompt "Follow our coding standards. Ensure all new code has tests. Use TypeScript for new files."

          # Optional: Advanced settings configuration
          # settings: |
          #   {
          #     "env": {
          #       "NODE_ENV": "test"
          #     }
          #   }

  update-changelog:
    name: Update changelog
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-update-changelog-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    permissions:
      contents: write
      pull-requests: read
      id-token: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Skip if last commit is our own changelog update
        id: skip
        # language="Shell Script"
        run: |
          LAST_MSG=$(git log -1 --format='%s')
          if [[ "$LAST_MSG" == "docs(readme): update changelog for"* ]]; then
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next image version
        if: steps.skip.outputs.should_skip != 'true'
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        # language="Shell Script"
        run: |
          LT_VERSION=$(grep '^ARG LT_VERSION=' Dockerfile | cut -d'=' -f2 | tr -d '"')
          TAGS=$(gh api "repos/${{ github.repository }}/tags" --jq '.[].name' 2>/dev/null || echo "")
          MAX=-1
          for tag in $TAGS; do
            if [[ ${tag} =~ ^${LT_VERSION}-([0-9]+)$ ]]; then
              N="${BASH_REMATCH[1]}"
              (( N > MAX )) && MAX=$N
            fi
          done
          echo "image_version=${LT_VERSION}-$(( MAX + 1 ))" >> "$GITHUB_OUTPUT"
          echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Prepare PR diff
        if: steps.skip.outputs.should_skip != 'true'
        # language="Shell Script"
        run: |
          git diff "origin/${{ github.base_ref }}...HEAD" \
            -- Dockerfile Dockerfile.fasttext entrypoint/ > changes.diff

      - name: Generate changelog entry with Claude
        if: steps.skip.outputs.should_skip != 'true'
        uses: anthropics/claude-code-action@86eb26bf0139bdd75acd15ea5f00f45ee0a284c2 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }} # zizmor: ignore[secrets-outside-env]
          prompt: |
            Update the changelog table in README.md based on changes in changes.diff.

            Context:
            - Next release tag: ${{ steps.version.outputs.image_version }}
            - Today's date (UTC): ${{ steps.version.outputs.today }}

            Instructions:
            1. Read changes.diff. If it is empty or contains no changes to Dockerfile,
               Dockerfile.fasttext, or entrypoint/, stop immediately — do not modify anything.
            2. Read README.md and locate the "## Changelog" table.
            3. Check if a row for tag "${{ steps.version.outputs.image_version }}" already exists:
               - If it exists: replace only its Change column content.
               - If not: insert a new row immediately after the header separator line
                 (the line starting with `| ---`).
            4. Row format — study and match the column widths of the surrounding rows:
               - Date column: ${{ steps.version.outputs.today }} (padded with spaces to match width)
               - Tag column: ${{ steps.version.outputs.image_version }} (padded with spaces to match width)
               - Change column: bullet points, each starting with "- ", joined by "<br/> "
                 (note the space after the slash). Each bullet must be short (≤ 8 words),
                 specific, and concrete. Only describe Dockerfile and entrypoint changes.
                 Ignore CI, test, documentation, and workflow changes entirely.
            5. Write the updated README.md using the Edit tool.
          claude_args: |
            --allowedTools Bash(cat:*),Read,Edit
            --max-turns 5

      - name: Commit and push changelog update
        if: steps.skip.outputs.should_skip != 'true'
        # language="Shell Script"
        run: |
          git diff --quiet README.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): update changelog for ${{ steps.version.outputs.image_version }}"
          git push
