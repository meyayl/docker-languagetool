name: Claude Code

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "Dockerfile"
      - "Dockerfile.fasttext"
      - "entrypoint/**"

permissions: {}

jobs:
  update-changelog:
    name: Update changelog
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-update-changelog-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    permissions:
      contents: write
      pull-requests: read
      id-token: write

    steps:
      - name: Checkout PR branch # zizmor: ignore[artipacked]
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Skip if last commit is our own changelog update
        id: skip
        # language="Shell Script"
        run: |
          LAST_MSG=$(git log -1 --format='%s')
          if [[ "$LAST_MSG" == "docs(changelog): update changelog for"* ]]; then
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next image version
        if: steps.skip.outputs.should_skip != 'true'
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        # language="Shell Script"
        run: |
          LT_VERSION=$(grep '^ARG LT_VERSION=' Dockerfile | cut -d'=' -f2 | tr -d '"')
          TAGS=$(gh api "repos/${{ github.repository }}/tags" --jq '.[].name' 2>/dev/null || echo "")
          MAX=-1
          for tag in $TAGS; do
            if [[ ${tag} =~ ^${LT_VERSION}-([0-9]+)$ ]]; then
              N="${BASH_REMATCH[1]}"
              (( N > MAX )) && MAX=$N
            fi
          done
          echo "image_version=${LT_VERSION}-$(( MAX + 1 ))" >> "$GITHUB_OUTPUT"
          echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Prepare PR diff
        if: steps.skip.outputs.should_skip != 'true'
        env:
          BASE_REF: ${{ github.base_ref }}
        # language="Shell Script"
        run: |
          git diff "origin/${BASE_REF}...HEAD" \
            -- Dockerfile Dockerfile.fasttext entrypoint/ > changes.diff

      - name: Generate changelog entry with Claude
        if: steps.skip.outputs.should_skip != 'true'
        id: claude-changelog
        continue-on-error: true
        uses: anthropics/claude-code-action@410165836eba8e7e60fc3587e60bebdfd35ca785 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }} # zizmor: ignore[secrets-outside-env]
          allowed_bots: "renovate[bot]"
          prompt: |
            Update CHANGELOG.md based on changes in changes.diff.
            CHANGELOG.md follows Keep a Changelog format: each release is a "## [tag] - date"
            section with "### Category" subsections (Added, Changed, Fixed, Security).

            Context:
            - Next release tag: ${{ steps.version.outputs.image_version }}
            - Today's date (UTC): ${{ steps.version.outputs.today }}

            Instructions:
            1. Read changes.diff. If it is empty or contains no changes to Dockerfile,
               Dockerfile.fasttext, or entrypoint/, stop immediately — do not modify anything.
               Classify each relevant change into one of:
                 Added    — new features, env vars, commands, platform support
                 Changed  — upgrades, refactors, behaviour changes
                 Fixed    — bug fixes
                 Security — CVE fixes, security-motivated dependency upgrades
               Write each as a concise bullet (≤ 10 words) starting with "- ".
               Ignore CI, test, documentation, and workflow changes.

            2. Read the first 20 lines of CHANGELOG.md using the Read tool with limit=20.

            3. Check whether a section heading
               "## [${{ steps.version.outputs.image_version }}]" already exists:

               a) Section does NOT exist — insert a new version section before the first
                  "## [" line in the file:
                  - old_string: take the "Image tags follow..." preamble line + blank line +
                    the first "## [" line (all three, exactly as they appear in the Read output).
                  - new_string: same preamble line + blank line + new version section +
                    blank line + original first "## [" line.
                  - New section format (omit subsections that have no bullets):

                      ## [${{ steps.version.outputs.image_version }}] - ${{ steps.version.outputs.today }}

                      ### Added

                      - bullet

                      ### Changed

                      - bullet

                      ### Fixed

                      - bullet

                      ### Security

                      - bullet

                  - Use the Edit tool with old_string and new_string.

               b) Section EXISTS — read the first 50 lines with limit=50 to capture it fully.
                  For each category that has new bullets:
                  - If the "### Category" subsection already exists within the version section:
                    append the new bullets after its last existing bullet using the Edit tool.
                  - If not: insert "### Category\n\n- bullets\n" before the next "## [" heading
                    that follows the version section, using the Edit tool.

            4. Update ARG IMAGE_VERSION and ARG IMAGE_CREATED in Dockerfile and Dockerfile.fasttext:
               - For each file, read only the first 2 lines using the Read tool with limit=2.
                 Line 1 is `ARG IMAGE_VERSION="..."`, line 2 is `ARG IMAGE_CREATED="..."`.
               - If `ARG IMAGE_VERSION` does not already equal "${{ steps.version.outputs.image_version }}",
                 use the Edit tool: old_string = the exact line 1 text,
                 new_string = `ARG IMAGE_VERSION="${{ steps.version.outputs.image_version }}"`.
               - If `ARG IMAGE_CREATED` does not already equal "${{ steps.version.outputs.today }}",
                 use the Edit tool: old_string = the exact line 2 text,
                 new_string = `ARG IMAGE_CREATED="${{ steps.version.outputs.today }}"`.
               - Apply the same two edits to both Dockerfile and Dockerfile.fasttext.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools Bash(cat:*),Read,Edit
            --max-turns 15

      - name: Wait before retry
        if: steps.skip.outputs.should_skip != 'true' && steps.claude-changelog.outcome == 'failure'
        run: sleep 65

      - name: Generate changelog entry with Claude (retry)
        if: steps.skip.outputs.should_skip != 'true' && steps.claude-changelog.outcome == 'failure'
        uses: anthropics/claude-code-action@410165836eba8e7e60fc3587e60bebdfd35ca785 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }} # zizmor: ignore[secrets-outside-env]
          allowed_bots: "renovate[bot]"
          prompt: |
            Update CHANGELOG.md based on changes in changes.diff.
            CHANGELOG.md follows Keep a Changelog format: each release is a "## [tag] - date"
            section with "### Category" subsections (Added, Changed, Fixed, Security).

            Context:
            - Next release tag: ${{ steps.version.outputs.image_version }}
            - Today's date (UTC): ${{ steps.version.outputs.today }}

            Instructions:
            1. Read changes.diff. If it is empty or contains no changes to Dockerfile,
               Dockerfile.fasttext, or entrypoint/, stop immediately — do not modify anything.
               Classify each relevant change into one of:
                 Added    — new features, env vars, commands, platform support
                 Changed  — upgrades, refactors, behaviour changes
                 Fixed    — bug fixes
                 Security — CVE fixes, security-motivated dependency upgrades
               Write each as a concise bullet (≤ 10 words) starting with "- ".
               Ignore CI, test, documentation, and workflow changes.

            2. Read the first 20 lines of CHANGELOG.md using the Read tool with limit=20.

            3. Check whether a section heading
               "## [${{ steps.version.outputs.image_version }}]" already exists:

               a) Section does NOT exist — insert a new version section before the first
                  "## [" line in the file:
                  - old_string: take the "Image tags follow..." preamble line + blank line +
                    the first "## [" line (all three, exactly as they appear in the Read output).
                  - new_string: same preamble line + blank line + new version section +
                    blank line + original first "## [" line.
                  - New section format (omit subsections that have no bullets):

                      ## [${{ steps.version.outputs.image_version }}] - ${{ steps.version.outputs.today }}

                      ### Added

                      - bullet

                      ### Changed

                      - bullet

                      ### Fixed

                      - bullet

                      ### Security

                      - bullet

                  - Use the Edit tool with old_string and new_string.

               b) Section EXISTS — read the first 50 lines with limit=50 to capture it fully.
                  For each category that has new bullets:
                  - If the "### Category" subsection already exists within the version section:
                    append the new bullets after its last existing bullet using the Edit tool.
                  - If not: insert "### Category\n\n- bullets\n" before the next "## [" heading
                    that follows the version section, using the Edit tool.

            4. Update ARG IMAGE_VERSION and ARG IMAGE_CREATED in Dockerfile and Dockerfile.fasttext:
               - For each file, read only the first 2 lines using the Read tool with limit=2.
                 Line 1 is `ARG IMAGE_VERSION="..."`, line 2 is `ARG IMAGE_CREATED="..."`.
               - If `ARG IMAGE_VERSION` does not already equal "${{ steps.version.outputs.image_version }}",
                 use the Edit tool: old_string = the exact line 1 text,
                 new_string = `ARG IMAGE_VERSION="${{ steps.version.outputs.image_version }}"`.
               - If `ARG IMAGE_CREATED` does not already equal "${{ steps.version.outputs.today }}",
                 use the Edit tool: old_string = the exact line 2 text,
                 new_string = `ARG IMAGE_CREATED="${{ steps.version.outputs.today }}"`.
               - Apply the same two edits to both Dockerfile and Dockerfile.fasttext.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools Bash(cat:*),Read,Edit
            --max-turns 15

      - name: Commit and push changelog update
        if: steps.skip.outputs.should_skip != 'true'
        env:
          IMAGE_VERSION: ${{ steps.version.outputs.image_version }}
        # language="Shell Script"
        run: |
          git diff --quiet CHANGELOG.md Dockerfile Dockerfile.fasttext && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md Dockerfile Dockerfile.fasttext
          git commit -m "docs(changelog): update changelog for ${IMAGE_VERSION}"
          git push
