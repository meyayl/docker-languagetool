---
name: Build and verify image

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'README.md'
      - 'docker-compose.yml'
      - '.gitignore'
      - '.github/linters*'
      - '.github/tests*'
      - '.github/workflows/reusable-super-linter.yaml'
      - 'renovate.json'
    branches:
      - 'main'
      - 'feature/*'
    tags:
      - '[0-9]+.[0-9]+-[0-9]+'
  pull_request:
#    types:
#      - opened
#      - synchronize
#      - reopened
jobs:
  super-linter:
    name: Super-Linter
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/feature/')

    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-super-linter-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      statuses: write

    uses: ./.github/workflows/reusable-super-linter.yaml

  compute-version:
    name: Compute image version
    runs-on: ubuntu-latest
    outputs:
      image_version: ${{ steps.version.outputs.IMAGE_VERSION }}
      lt_version: ${{ steps.version.outputs.LT_VERSION }}
      image_created: ${{ steps.version.outputs.IMAGE_CREATED }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compute version
        id: version
        # language="Shell Script"
        run: |
          LT_VERSION=$(grep '^ARG LT_VERSION=' Dockerfile | cut -d'=' -f2 | tr -d '"')
          echo "LT_VERSION=${LT_VERSION}" >> $GITHUB_OUTPUT
          echo "IMAGE_CREATED=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "IMAGE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            TAGS=$(gh api repos/${{ github.repository }}/tags --jq '.[].name' || echo "")
            MAX=-1
            for tag in $TAGS; do
              if [[ ${tag} =~ ^${LT_VERSION}-([0-9]+)$ ]]; then
                N="${BASH_REMATCH[1]}"
                (( N > MAX )) && MAX=$N
              fi
            done
            echo "IMAGE_VERSION=${LT_VERSION}-$(( MAX + 1 ))" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  detect-changes:
    name: Detect Dockerfile/entrypoint changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      relevant: ${{ steps.check.outputs.relevant }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check changed paths
        id: check
        # language="Shell Script"
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BASE=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            BASE=$(git rev-list --max-parents=0 HEAD)
          else
            BASE="${{ github.event.before }}"
          fi
          CHANGES=$(git diff --name-only "$BASE" HEAD | grep -E '^(Dockerfile|Dockerfile\.fasttext|entrypoint/)' || true)
          echo "relevant=$([ -n "$CHANGES" ] && echo true || echo false)" >> $GITHUB_OUTPUT

  build-test-image:
    name: Build Image for Testing
    needs: [compute-version]
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-buil-test-image--${{ github.ref }}
      cancel-in-progress: true

    permissions:
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push to GHCR
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          sbom: true
          pull: true
          push: true
          tags: ghcr.io/meyayl/languagetool:${{ github.run_id }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            IMAGE_VERSION=${{ needs.compute-version.outputs.image_version }}
            IMAGE_CREATED=${{ needs.compute-version.outputs.image_created }}

  integration-test-image:
    name: Integration test Image
    needs: [ build-test-image ]
    runs-on: ubuntu-latest
    strategy:
      # max-parallel: 1
      matrix:
        compose-file:
          - privileged-rw.yml
          - privileged-ro.yml
          - privileged-no-volumes.yml
          - unprivileged-rw.yml
          - unprivileged-ro.yml
          - unprivileged-no-volumes.yml

    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-${{ matrix.compose-file }}-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        env:
          IMAGE: ghcr.io/meyayl/languagetool:${{ github.run_id }}
        # language="Shell Script"
        run: |
          export COMPOSE_FILE=".github/tests/${{ matrix.compose-file }}"
          COMPOSE_PROJECT_NAME="${{ matrix.compose-file }}"
          export COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME%.yml}"
          mkdir .github/tests/ngrams .github/tests/fasttext
          echo "🚀 Starting LanguageTool container with ${{ matrix.compose-file }}..."
          docker compose up -d
          echo "📦 Listing Deployed Compose Projects"
          docker compose ls
          echo "⏳ Waiting for container to start..."
          sleep 10s
          echo "📋 Container logs:"
          docker compose logs
          echo "☕ Checking Java version..."
          docker compose exec languagetool /opt/java/customjre/bin/java --version
          echo "📖 Checking LanguageTool help..."
          docker compose exec languagetool /entrypoint help
          echo "🧪 Testing LanguageTool API..."
          curl --data "language=en-US&text=a simple test" \
            http://127.0.0.1:8081/v2/check | tee /dev/stderr | grep -q detectedLanguage
          echo "🛑 Stopping container..."
          docker compose down

  scan-image:
    name: Scan Image with Grype
    needs: [ build-test-image ]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/')
    outputs:
      cve_report: ${{ steps.scan.outputs.json }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-scan-image-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      packages: read

    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Grype Scan for all CVEs (non-blocking)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        id: scan
        with:
          image: "ghcr.io/meyayl/languagetool:${{ github.run_id }}"
          severity-cutoff: high
          output-format: json
          fail-build: false

  update-pr:
    name: Update PullRequest
    needs: [ build-test-image, integration-test-image, scan-image ]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      pull-requests: write

    steps:
      - name: Find comment for image tags
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: Docker image tag(s) pushed

        # If PR, put image tags in the PR comments
      - name: Create or update comment for image tags
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        if: github.event_name == 'pull_request'
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          # language="Markdown"
          body: |
            Docker image tag(s) pushed:
            ```text
            ghcr.io/meyayl/languagetool:${{ github.run_id }}
            ```
          edit-mode: replace

  create-release-tag:
    name: Create release tag
    needs: [compute-version, detect-changes, integration-test-image]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.result == 'success' &&
      needs.detect-changes.outputs.relevant == 'true'
    environment: release

    permissions:
      contents: write

    steps:
      - name: Create and push tag
        # language="Shell Script"
        run: |
          TAG="${{ needs.compute-version.outputs.image_version }}"
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/${TAG}" \
            -f sha="${{ github.sha }}"
        env:
          GH_TOKEN: ${{ github.token }}

  cve-check-image-and-report:
    name: Scan Image with Ancore for CVEs and report
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ build-test-image ]
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-check-cve-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Ancore scan for all CVEs (non-blocking)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        id: scan
        with:
          image: "ghcr.io/meyayl/languagetool:${{ github.run_id }}"
          severity-cutoff: high
          output-format: sarif
          only-fixed: true
          fail-build: true

      - name: upload Anchore scan SARIF report
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

  retag-and-push-final-image:
    name: Retag and push final image
    needs: [compute-version, build-test-image, integration-test-image, cve-check-image-and-report]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      packages: read

    steps:

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and retag image
        # language="Shell Script"
        run: |
          SRC="ghcr.io/meyayl/languagetool:${{ github.run_id }}"
          docker pull "$SRC"
          docker tag "$SRC" "meyay/languagetool:${{ needs.compute-version.outputs.image_version }}"
          docker tag "$SRC" "meyay/languagetool:${{ needs.compute-version.outputs.lt_version }}"
          docker tag "$SRC" "meyay/languagetool:latest"
          docker push "meyay/languagetool:${{ needs.compute-version.outputs.image_version }}"
          docker push "meyay/languagetool:${{ needs.compute-version.outputs.lt_version }}"
          docker push "meyay/languagetool:latest"

      - name: Update repo description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: meyay/languagetool
