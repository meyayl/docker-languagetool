---
name: Build and verify image

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "[0-9]+.[0-9]+-[0-9]+"
  pull_request:
#    types:
#      - opened
#      - synchronize
#      - reopened

permissions: {}

jobs:
  super-linter:
    name: Super-Linter
    if: github.event_name == 'pull_request'

    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-super-linter-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      statuses: write
      pull-requests: write

    uses: ./.github/workflows/reusable-super-linter.yaml

  compute-version:
    name: Compute image version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_version: ${{ steps.version.outputs.IMAGE_VERSION }}
      lt_version: ${{ steps.version.outputs.LT_VERSION }}
      image_created: ${{ steps.version.outputs.IMAGE_CREATED }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Compute version
        id: version
        # language="Shell Script"
        run: |
          LT_VERSION=$(grep '^ARG LT_VERSION=' Dockerfile | cut -d'=' -f2 | tr -d '"')
          echo "LT_VERSION=${LT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_CREATED=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "IMAGE_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            TAGS=$(gh api repos/${{ github.repository }}/tags --jq '.[].name' || echo "")
            MAX=-1
            for tag in $TAGS; do
              if [[ ${tag} =~ ^${LT_VERSION}-([0-9]+)$ ]]; then
                N="${BASH_REMATCH[1]}"
                (( N > MAX )) && MAX=$N
              fi
            done
            echo "IMAGE_VERSION=${LT_VERSION}-$(( MAX + 1 ))" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  detect-changes:
    name: Detect Dockerfile/entrypoint changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    outputs:
      relevant: ${{ steps.check.outputs.relevant }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check changed paths
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
        # language="Shell Script"
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            BASE=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          elif [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            BASE=$(git rev-list --max-parents=0 HEAD)
          else
            BASE="$BEFORE"
          fi
          CHANGES=$(git diff --name-only "$BASE" HEAD | grep -E '^(Dockerfile|Dockerfile\.fasttext|entrypoint/)' || true)
          echo "relevant=$([ -n "$CHANGES" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  build-test-image:
    name: Build Image for Testing
    needs: [compute-version]
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-buil-test-image--${{ github.ref }}
      cancel-in-progress: true

    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # zizmor: ignore[secrets-outside-env]
          password: ${{ secrets.DOCKERHUB_TOKEN }} # zizmor: ignore[secrets-outside-env]

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push to GHCR
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          sbom: true
          pull: true
          push: true
          tags: ghcr.io/meyayl/languagetool:${{ github.run_id }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            IMAGE_VERSION=${{ needs.compute-version.outputs.image_version }}
            IMAGE_CREATED=${{ needs.compute-version.outputs.image_created }}

  integration-test-image:
    name: Integration test Image
    needs: [build-test-image]
    runs-on: ${{ matrix.runner }}
    strategy:
      # max-parallel: 1
      matrix:
        compose-file:
          - privileged-rw.yml
          - privileged-ro.yml
          - privileged-no-volumes.yml
          - unprivileged-rw.yml
          - unprivileged-ro.yml
          - unprivileged-no-volumes.yml
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm

    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-${{ matrix.compose-file }}-${{ matrix.runner }}-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        env:
          IMAGE: ghcr.io/meyayl/languagetool:${{ github.run_id }}
        # language="Shell Script"
        run: |
          export COMPOSE_FILE=".github/tests/${{ matrix.compose-file }}"
          COMPOSE_PROJECT_NAME="${{ matrix.compose-file }}"
          export COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME%.yml}"
          mkdir .github/tests/ngrams .github/tests/fasttext
          echo "🚀 Starting LanguageTool container with ${{ matrix.compose-file }}..."
          docker compose up -d
          echo "📦 Listing Deployed Compose Projects"
          docker compose ls
          echo "⏳ Waiting for container to start..."
          sleep 10s
          echo "📋 Container logs:"
          docker compose logs
          echo "☕ Checking Java version..."
          docker compose exec languagetool /opt/java/customjre/bin/java --version
          echo "📖 Checking LanguageTool help..."
          docker compose exec languagetool /entrypoint help
          echo "🧪 Testing LanguageTool API..."
          curl --data "language=en-US&text=a simple test" \
            http://127.0.0.1:8081/v2/check | tee /dev/stderr | grep -q detectedLanguage
          echo "🛑 Stopping container..."
          docker compose down

  scan-image:
    name: Scan Image with Grype
    needs: [build-test-image]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/')
    outputs:
      cve_report: ${{ steps.scan.outputs.json }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-scan-image-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Grype Scan for all CVEs (non-blocking)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        id: scan
        with:
          image: "ghcr.io/meyayl/languagetool:${{ github.run_id }}"
          severity-cutoff: high
          output-format: json
          fail-build: false

  update-pr:
    name: Update PullRequest
    needs: [build-test-image, integration-test-image, scan-image]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      pull-requests: write

    steps:
      - name: Find comment for image tags
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4 # zizmor: ignore[superfluous-actions]
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: Docker image tag(s) pushed

        # If PR, put image tags in the PR comments
      - name: Create or update comment for image tags
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5 # zizmor: ignore[superfluous-actions]
        if: github.event_name == 'pull_request'
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          # language="Markdown"
          body: |
            Docker image tag(s) pushed:
            ```text
            ghcr.io/meyayl/languagetool:${{ github.run_id }}
            ```
          edit-mode: replace

  create-release-tag:
    name: Create release tag
    needs: [compute-version, detect-changes, integration-test-image]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.result == 'success' &&
      needs.detect-changes.outputs.relevant == 'true'
    environment: release
    permissions:
      contents: write

    steps:
      - name: Create and push tag
        # language="Shell Script"
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_VERSION: ${{ needs.compute-version.outputs.image_version }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        # language="Shell Script"
        run: |
          gh api "repos/${REPO}/git/refs" \
            -f "ref=refs/tags/${IMAGE_VERSION}" \
            -f "sha=${SHA}"

  cve-check-image-and-report:
    name: Scan Image with Ancore for CVEs and report
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-test-image]
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-check-cve-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Ancore scan for all CVEs (non-blocking)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        id: scan
        with:
          image: "ghcr.io/meyayl/languagetool:${{ github.run_id }}"
          severity-cutoff: high
          output-format: sarif
          only-fixed: true
          fail-build: true

      - name: upload Anchore scan SARIF report
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

  retag-and-push-final-image:
    name: Retag and push final image
    needs:
      [
        compute-version,
        build-test-image,
        integration-test-image,
        cve-check-image-and-report,
      ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # zizmor: ignore[secrets-outside-env]
          password: ${{ secrets.DOCKERHUB_TOKEN }} # zizmor: ignore[secrets-outside-env]

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Push multi-arch manifest to Docker Hub
        env:
          RUN_ID: ${{ github.run_id }}
          IMAGE_VERSION: ${{ needs.compute-version.outputs.image_version }}
          LT_VERSION: ${{ needs.compute-version.outputs.lt_version }}
        # language="Shell Script"
        run: |
          SRC="ghcr.io/meyayl/languagetool:${RUN_ID}"
          docker buildx imagetools create \
            --tag "meyay/languagetool:${IMAGE_VERSION}" \
            --tag "meyay/languagetool:${LT_VERSION}" \
            --tag "meyay/languagetool:latest" \
            "${SRC}"

      - name: Update repo description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # zizmor: ignore[secrets-outside-env]
          password: ${{ secrets.DOCKERHUB_TOKEN }} # zizmor: ignore[secrets-outside-env]
          repository: meyay/languagetool

  generate-release-summary:
    name: Generate release summary
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare change diff
        id: diff
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        # language="Shell Script"
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)
          echo "prev_tag=${PREV_TAG:-initial}" >> "$GITHUB_OUTPUT"
          BASE="${PREV_TAG:-$(git rev-list --max-parents=0 HEAD)}"
          git diff "${BASE}...${CURRENT_TAG}" -- Dockerfile Dockerfile.fasttext entrypoint/ > changes.diff

      - name: Generate release notes with Claude
        uses: anthropics/claude-code-action@70a6e5256e9e2366a1ed5c041904a982ba3a328f # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }} # zizmor: ignore[secrets-outside-env]
          prompt: |
            Read the file changes.diff in the current directory. It contains the git diff for
            LanguageTool Docker image release ${{ github.ref_name }}
            (previous release: ${{ steps.diff.outputs.prev_tag }}).

            Generate a concise release description covering ONLY changes to:
            - Dockerfile and Dockerfile.fasttext
            - The entrypoint Go binary (entrypoint/ directory)

            Completely ignore any CI, test, documentation, or other changes.

            Format the output as Markdown:
            - Start with a one-paragraph summary of what changed in this release
            - Add a "### Dockerfile" section with bullet points (omit entirely if no Dockerfile changes)
            - Add a "### Entrypoint" section with bullet points (omit entirely if no entrypoint changes)
            - If changes.diff is empty or contains no relevant changes, write only:
              "No changes to Dockerfile or entrypoint in this release."

            Write the final Markdown to a file named release-notes.md.
            Output nothing else — no commentary, no explanation, just write the file and stop.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools Bash,Write,Read
            --max-turns 10

      - name: Ensure release notes file exists
        # language="Shell Script"
        run: |
          [ -f release-notes.md ] || echo "No release notes generated." > release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-notes
          path: release-notes.md

  create-github-release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - compute-version
      - generate-release-summary
      - retag-and-push-final-image
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release notes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-notes

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          LT_VERSION: ${{ needs.compute-version.outputs.lt_version }}
        # language="Shell Script"
        run: |
          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "LanguageTool ${LT_VERSION} (${TAG})" \
            --notes-file release-notes.md
