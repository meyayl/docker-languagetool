---
services:
  languagetool:
    image: meyay/languagetool:latest
    restart: unless-stopped
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp:exec
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    ports:
      - 8081:8081
    volumes:
      - ./ngrams:/ngrams
      - ./fasttext:/fasttext